<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LongD Banana | ใบสั่งวัตถุดิบ</title>
<style>
  :root{
    --green-dark:#5c3a22;
    --green:#7a5230;
    --green-mid:#9c6f42;
    --green-light:#f7efe3;
    --green-line:#e0cbac;
    --text:#2e2113;
    --muted:#8a7660;
    --paper:#ffffff;
    --bg:#faf6f0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Noto Sans Thai","Sarabun",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg);
    color:var(--text);
    padding-bottom:40px;
  }

  /* ---------- Header ---------- */
  .topbar{
    background:linear-gradient(135deg,var(--green-dark),var(--green));
    color:#fff;
    padding:16px 18px;
    display:flex;
    align-items:center;
    gap:12px;
    position:sticky;
    top:0;
    z-index:50;
    box-shadow:0 2px 10px rgba(0,0,0,.12);
  }
  .topbar img{
    height:42px;
    width:42px;
    object-fit:contain;
    background:#fff;
    border-radius:10px;
    padding:3px;
    flex-shrink:0;
  }
  .topbar .titles{line-height:1.25;}
  .topbar h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.2px;}
  .topbar p{font-size:12px;margin:1px 0 0;opacity:.85;}

  /* ---------- Layout ---------- */
  .wrap{max-width:640px;margin:0 auto;padding:14px;}
  .card{
    background:var(--paper);
    border-radius:14px;
    box-shadow:0 1px 3px rgba(30,94,52,.08);
    border:1px solid var(--green-line);
    margin-bottom:14px;
    overflow:hidden;
  }
  .card-body{padding:16px;}
  label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:var(--green-dark);
    margin-bottom:6px;
  }
  .field{margin-bottom:14px;}
  .field:last-child{margin-bottom:0;}
  select,input[type=text],input[type=date],textarea{
    width:100%;
    font-size:16px;
    padding:12px 12px;
    border-radius:10px;
    border:1.5px solid var(--green-line);
    background:var(--green-light);
    color:var(--text);
    font-family:inherit;
    -webkit-appearance:none;
    appearance:none;
  }
  select{
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%232e7d46' stroke-width='2.5'><polyline points='6 9 12 15 18 9'/></svg>");
    background-repeat:no-repeat;
    background-position:right 12px center;
    padding-right:36px;
  }
  textarea{resize:vertical;min-height:70px;}
  input:focus,select:focus,textarea:focus{
    outline:none;
    border-color:var(--green-mid);
    box-shadow:0 0 0 3px rgba(63,156,90,.15);
  }

  /* ---------- Category accordion ---------- */
  .category{margin-bottom:12px;}
  .cat-head{
    background:var(--green);
    color:#fff;
    padding:13px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-weight:700;
    font-size:14.5px;
  }

  .cat-items{}
  .item-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:12px 16px;
    border-top:1px solid var(--green-light);
  }
  .item-row .idx{
    color:var(--muted);
    font-size:12px;
    width:20px;
    flex-shrink:0;
  }
  .item-row .name{
    flex:1;
    font-size:14.5px;
    line-height:1.35;
  }
  .item-row input.qty{
    width:64px;
    text-align:center;
    font-size:16px;
    font-weight:700;
    padding:9px 4px;
    border-radius:8px;
    border:1.5px solid var(--green-line);
    background:var(--green-light);
    color:var(--green-dark);
  }
  .item-row.has-qty{background:#f2fbf5;}
  .item-row.has-qty .name{color:var(--green-dark);font-weight:600;}

  /* ---------- Buttons ---------- */
  .actions{
    display:flex;
    gap:10px;
    position:sticky;
    bottom:0;
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(to top, var(--bg) 60%, rgba(242,247,243,0));
  }
  .btn{
    flex:1;
    padding:14px 10px;
    border-radius:12px;
    border:none;
    font-size:15px;
    font-weight:700;
    font-family:inherit;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .btn-clear{
    background:#fff;
    color:var(--green-dark);
    border:1.5px solid var(--green-line);
    flex:0 0 96px;
  }
  .btn-generate{
    background:var(--green-dark);
    color:#fff;
    box-shadow:0 3px 10px rgba(30,94,52,.3);
  }
  .btn-generate:active{transform:translateY(1px);}
  .summary-pill{
    text-align:center;
    font-size:12.5px;
    color:var(--muted);
    padding:2px 14px 8px;
  }
  .summary-pill b{color:var(--green-dark);}

  /* ---------- Print / Document view ---------- */
  #printView{display:none;}
  .doc-page{
    background:#fff;
    max-width:820px;
    margin:0 auto 24px;
    padding:22px 26px;
    box-shadow:0 1px 4px rgba(0,0,0,.1);
  }
  .doc-toolbar{
    max-width:820px;
    margin:14px auto;
    display:flex;
    gap:10px;
    padding:0 14px;
  }
  .doc-head{
    display:flex;
    align-items:center;
    gap:14px;
    border-bottom:3px solid var(--green-dark);
    padding-bottom:12px;
    margin-bottom:14px;
  }
  .doc-head img{height:52px;width:52px;object-fit:contain;}
  .doc-head .shop{flex:1;}
  .doc-head .shop h2{margin:0;font-size:20px;color:var(--green-dark);}
  .doc-head .shop p{margin:2px 0 0;font-size:12px;color:var(--muted);}
  .doc-head .doctag{
    border:1.5px solid var(--green-dark);
    color:var(--green-dark);
    font-weight:700;
    font-size:12px;
    padding:6px 12px;
    border-radius:8px;
    text-align:center;
    white-space:nowrap;
  }
  .doc-meta{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px 16px;
    font-size:13px;
    margin-bottom:16px;
  }
  .doc-meta .mrow{
    border:1px solid var(--green-line);
    border-radius:8px;
    padding:7px 10px;
    background:var(--green-light);
  }
  .doc-meta .mrow span{display:block;font-size:10.5px;color:var(--green-dark);font-weight:700;margin-bottom:2px;}
  table.doc-table{
    width:100%;
    border-collapse:collapse;
    font-size:12.5px;
  }
  table.doc-table th{
    background:var(--green-dark);
    color:#fff;
    font-size:11.5px;
    padding:7px 6px;
    text-align:left;
  }
  table.doc-table td{
    border-bottom:1px solid #dcece0;
    padding:6px 6px;
    vertical-align:top;
  }
  table.doc-table td.c-idx{width:22px;color:var(--muted);}
  table.doc-table td.c-qty{width:56px;text-align:center;font-weight:700;color:var(--green-dark);}
  table.doc-table th.c-blank,table.doc-table td.c-blank{width:60px;}
  .doc-remark{
    margin-top:16px;
    border:1px solid var(--green-line);
    border-radius:8px;
    padding:10px 12px;
    font-size:12.5px;
    min-height:44px;
  }
  .doc-remark span{display:block;font-size:10.5px;font-weight:700;color:var(--green-dark);margin-bottom:4px;}
  .doc-sign{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
    margin-top:34px;
    font-size:11.5px;
    text-align:center;
    color:var(--muted);
  }
  .doc-sign .line{border-top:1px solid #9ab8a4;margin-bottom:6px;padding-top:34px;}
  .doc-foot{
    margin-top:18px;
    font-size:10px;
    color:var(--muted);
    text-align:right;
  }
  .empty-note{
    text-align:center;
    color:var(--muted);
    font-size:13px;
    padding:30px 10px;
  }

  @media print{
    body{background:#fff;padding:0;margin:0;}
    .topbar,.wrap,.doc-toolbar,.actions{display:none !important;}
    #printView{display:block !important;margin:0;padding:0;}
    .doc-page{
      box-shadow:none;
      margin:0;
      max-width:none;
      width:100%;
      padding:0;
    }
    @page{size:A4;margin:8mm 6mm;}
    table.doc-table tr{page-break-inside:avoid;}
  }
</style>
</head>

<script>
/* ---------------- Data ---------------- */
const CATEGORIES = [
  { name: "ภาชนะบรรจุ", icon: "🍌", items: [
    "แก้วใส่กล้วยปิ้ง","ฝา","ถุงใส่กล้วยทอด","กล่องใส่กล้วยไส้ทะลัก","ถ้วยใส่น้ำราดกล้วยปิ้ง","กล่องกล้วยอบธัญพืช"
  ]},
  { name: "ถุง", icon: "🛍️", items: [
    "ถุง 6x14","ถุง 8x16","ถุง 12x26","ถุงหิ้ว OK (ถุงหิ้ว)","ถุงร้อน","ถุงขยะ"
  ]},
  { name: "อุปกรณ์ครัว / เสิร์ฟ", icon: "🧤", items: [
    "ถุงมือ","ไม้จิ้ม","กรรไกร","หนังยาง","ฝอยขัดหม้อ","สก๊อตไบร์ท"
  ]},
  { name: "วัตถุดิบทำกล้วย", icon: "🥥", items: [
    "แป้งกล้วยทอด","น้ำตาลทราย","น้ำตาลปิ๊บ","กะทิ","ใบเตย","ลูกชิด","ฝอยทอง","แป้งข้าวโพด","น้ำมันพืช","เกลือ"
  ]},
  { name: "สินค้ากล้วยแปรรูป", icon: "🍯", items: [
    "กล้วยอบธัญพืช","กล้วยหนึบ","กล้วยฉาบเบรกแตก","กล้วยฉาบอบเนย","มันม่วงฉาบ"
  ]},
  { name: "สติกเกอร์ & กระดาษ", icon: "🏷️", items: [
    "สติกเกอร์","สติกเกอร์หนึบ","สติกเกอร์ธัญพืช","สติกเกอร์ม้วนหนึบ","กระดาษใบเสร็จ","กระดาษทิชชู่","เทปใส"
  ]},
  { name: "น้ำยาทำความสะอาด", icon: "🧹", items: [
    "น้ำยาล้างจาน","น้ำยาซักผ้า","น้ำยาล้างบ่อดักไขมัน","น้ำยาเช็ดกระจก"
  ]},
  { name: "อุปกรณ์สำนักงาน", icon: "📎", items: [
    "แม็ค","ลูกแม็ค","ปากกา","ลิควิด"
  ]}
];

const THAI_MONTHS = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];

/* ---------------- Build form ---------------- */
const listEl = document.getElementById('categoryList');
let globalIdx = 0;

CATEGORIES.forEach((cat, ci) => {
  const catDiv = document.createElement('div');
  catDiv.className = 'category';
  catDiv.id = 'cat-' + ci;

  const head = document.createElement('div');
  head.className = 'cat-head';
  head.innerHTML = `<span>${cat.icon} ${cat.name}</span>`;
  catDiv.appendChild(head);

  const itemsWrap = document.createElement('div');
  itemsWrap.className = 'cat-items';

  cat.items.forEach((itemName, ii) => {
    globalIdx++;
    const row = document.createElement('div');
    row.className = 'item-row';
    row.id = `row-${ci}-${ii}`;
    row.innerHTML = `
      <span class="idx">${globalIdx}</span>
      <span class="name">${itemName}</span>
      <input class="qty" type="number" min="0" inputmode="numeric" pattern="[0-9]*" placeholder="0" data-cat="${ci}" data-item="${ii}">
    `;
    itemsWrap.appendChild(row);
  });

  catDiv.appendChild(itemsWrap);
  listEl.appendChild(catDiv);
});

/* ---------------- Interactivity ---------------- */
listEl.addEventListener('input', (e) => {
  if (!e.target.classList.contains('qty')) return;
  const row = e.target.closest('.item-row');
  const val = parseInt(e.target.value, 10);
  row.classList.toggle('has-qty', val > 0);
  updateCounts();
});

function updateCounts(){
  let total = 0;
  document.querySelectorAll('.qty').forEach(inp => {
    if (parseInt(inp.value,10) > 0) total++;
  });
  document.getElementById('pickCount').textContent = total;
}

function todayISO(){
  const d = new Date();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${d.getFullYear()}-${mm}-${dd}`;
}
document.getElementById('orderDate').value = todayISO();

function clearForm(){
  if(!confirm('ล้างข้อมูลทั้งหมดในฟอร์มหรือไม่?')) return;
  document.querySelectorAll('.qty').forEach(inp => { inp.value=''; inp.closest('.item-row').classList.remove('has-qty'); });
  document.getElementById('employee').value = '';
  document.getElementById('remark').value = '';
  document.getElementById('orderDate').value = todayISO();
  updateCounts();
}

function thaiDate(iso){
  if(!iso) return '-';
  const [y,m,d] = iso.split('-').map(Number);
  return `${d} ${THAI_MONTHS[m-1]} ${y+543}`;
}

/* ---------------- Generate printable document ---------------- */
function generateDoc(){
  const branch = document.getElementById('branch').value;
  const employee = document.getElementById('employee').value.trim() || '-';
  const dateISO = document.getElementById('orderDate').value;
  const remark = document.getElementById('remark').value.trim();

  // gather picked items in flat sequential order (no category grouping)
  const rows = [];
  CATEGORIES.forEach((cat) => {
    cat.items.forEach((itemName, ii) => {
      const inp = document.querySelector(`.qty[data-cat="${CATEGORIES.indexOf(cat)}"][data-item="${ii}"]`);
      const val = parseInt(inp.value, 10);
      if (val > 0){
        rows.push({ name: itemName, qty: val });
      }
    });
  });
  rows.forEach((r, i) => { r.no = i + 1; });

  const docPage = document.getElementById('docPage');

  if (rows.length === 0){
